<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickUp Manager</title>
<link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { background:#f5f6fa; font-family: 'Segoe UI', sans-serif; }
  .sidebar { width:240px; min-height:100vh; background:#2a9d8f; color:#fff; position:fixed; }
  .sidebar .nav-link { color:rgba(255,255,255,.85); padding:.75rem 1.5rem; }
  .sidebar .nav-link:hover, .sidebar .nav-link.active { background:rgba(0,0,0,.15); color:#fff; }
  .sidebar .hotel-name { font-size:1.1rem; font-weight:600; padding:1.2rem 1.5rem; border-bottom:1px solid rgba(255,255,255,.2); }
  .main-content { margin-left:240px; padding:2rem; }
  .card { border:none; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
  .card-header { background:#fff; font-weight:600; border-bottom:3px solid #2a9d8f; }
  .occ-red { color:#e63946; font-weight:600; }
  .occ-green { color:#2a9d8f; font-weight:600; }
  .var-up { color:#2a9d8f; font-weight:600; }
  .var-down { color:#e63946; font-weight:600; }
  .variance-box { text-align:center; padding:1.5rem; }
  .variance-arrow { font-size:3rem; }
  .table th { font-size:.82rem; color:#6c757d; text-transform:uppercase; }
  .row-total { font-weight:700; background:#f0faf9; }
  .flash-msg { position:fixed; top:1rem; right:1rem; z-index:9999; min-width:280px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar d-flex flex-column">
  <div class="hotel-name">🏨 {{ hotel_name | default('PickUp Manager') }}</div>
  <nav class="mt-2">
    <a href="/pickup" class="nav-link {% if active=='pickup' %}active{% endif %}">📊 PickUp</a>
    <a href="/caricamento" class="nav-link {% if active=='caricamento' %}active{% endif %}">⬆️ Caricamento</a>
    <a href="/impostazioni" class="nav-link {% if active=='settings' %}active{% endif %}">⚙️ Impostazioni</a>
  </nav>
</div>

<!-- Flash messages -->
{% with msgs = get_flashed_messages(with_categories=true) %}
{% if msgs %}
<div class="flash-msg">
  {% for cat, msg in msgs %}
  <div class="alert alert-{{ 'success' if cat=='success' else 'danger' }} alert-dismissible fade show">
    {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>
{% endif %}
{% endwith %}

<div class="main-content">
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
